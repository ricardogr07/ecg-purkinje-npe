name: ci

on:
  push:
    branches: [main, "science/**"]
  pull_request:

# python-ci and ui-ci run first (in parallel). package-ci and docker-build each depend on BOTH
# passing, then run in parallel with each other.
jobs:
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff check .
      # Default suite; sim-heavy tests are gated behind RUN_SLOW (see tests/conftest.py).
      - run: uv run pytest -q --cov=src --cov=conduction_lens --cov-report=term-missing

  ui-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      # prebuild (gen-real.mjs) degrades gracefully without outputs/ (uses the committed artifact).
      - run: npm run build

  package-ci:
    needs: [python-ci, ui-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      # uv sync installs the project, so the console entry point must resolve and import the full
      # science stack (conduction_lens -> core/sim/npe/calib). uv build proves the wheel packages.
      - run: uv sync --group dev
      - run: uv run conduction-lens --help
      - run: uv build --wheel

  docker-build:
    needs: [python-ci, ui-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build CLI / pipeline image
        run: docker build -f Dockerfile.cli --build-arg GIT_SHA=${GITHUB_SHA::7} -t conduction-lens:ci .
      - name: Run the CLI image (packaging smoke)
        run: docker run --rm conduction-lens:ci --help
      # The demo image bakes a Contract-B artifact at repo root; the real one lives in gitignored
      # outputs/, so stage a minimal placeholder for the build-only check (image is not run here).
      - name: Stage placeholder Contract-B for the demo image
        run: printf '{}' > contract_b.json
      - name: Build demo server image
        run: docker build -f Dockerfile.demo --build-arg GIT_SHA=${GITHUB_SHA::7} -t conduction-lens-demo:ci .
